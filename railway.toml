[build]
builder = "DOCKERFILE"
dockerfilePath = "Dockerfile"

[deploy]
# Production entrypoint: Oracle service (model + API)
# Override with BRAHMAN_SERVICE_MODE=kernel for Sovereign Node only
startCommand = "python run.py"
healthcheckPath = "/health"
healthcheckTimeout = 120
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

[deploy.env]
TORCH_NUM_THREADS = "8"
BRAHMAN_ENV = "production"
# REQUIRED in production:
# BRAHMAN_API_KEY = "<set via Railway dashboard>"
# BRAHMAN_MODEL_SHA256 = "<set via Railway dashboard>"
# BRAHMAN_CORS_ORIGINS = "https://yourdomain.com"
